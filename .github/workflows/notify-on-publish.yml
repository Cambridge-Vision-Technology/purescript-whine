name: notify-on-publish

on:
  push:
    branches: [main]

jobs:
  notify:
    uses: Cambridge-Vision-Technology/maintenance/.github/workflows/notify-downstream.yml@main
    with:
      source-repo: ${{ github.repository }}
      head-commit-message: ${{ github.event.head_commit.message }}
    secrets:
      AUTO_UPDATE_APP_ID: ${{ secrets.AUTO_UPDATE_APP_ID }}
      AUTO_UPDATE_APP_PRIVATE_KEY: ${{ secrets.AUTO_UPDATE_APP_PRIVATE_KEY }}
